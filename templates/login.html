<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanAssist | Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/login.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Left Section -->
    <div class="left-panel">
        <div class="content">
            <h1>LoanAssist</h1>
            <p>
                Intelligent EMI Default Prediction Platform
            </p>

            <div class="features">
                <div><i class="fa-solid fa-chart-line"></i> AI Risk Analysis</div>
                <div><i class="fa-solid fa-users"></i> Customer Insights</div>
                <div><i class="fa-solid fa-file"></i> Analytics Dashboard</div>
            </div>
        </div>
    </div>

    <!-- Right Section -->
    <div class="right-panel">

        <div class="login-card">

            <h2>Welcome Back</h2>
            <p class="subtitle">
                Sign in to continue
            </p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="error-box">
                {{ messages[0] }}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST">

                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text"
                           name="username"
                           placeholder="Username"
                           required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Password"
                           required>

                    <span class="toggle-password"
                          onclick="togglePassword()">
                        <i class="fa-solid fa-eye"></i>
                    </span>
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox">
                        Remember Me
                    </label>

                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit">
                    Login
                </button>

            </form>

        </div>

    </div>

</div>

<script>
function togglePassword() {
    let password = document.getElementById("password");

    if (password.type === "password") {
        password.type = "text";
    } else {
        password.type = "password";
    }
}
</script>

</body>
</html>
